<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquareOS • Criar Máquina</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/icones/icones 1/logo.png" type="image/png">
    <style>
        /* --- VARIÁVEIS DE COR E ESTILO --- */
        :root {
            --bg-dark: #050310; 
            --card-bg: rgba(10, 5, 25, 0.7); 
            --border-color: rgba(175, 80, 255, 0.4);
            --text-color: #F0F0FF;
            --text-muted: #AFADCC;
            --accent-purple: #9333EA; 
            --accent-light: #C080FF; 
            --success-color: #2ECC71;
            --error-color: #FF5733; /* Nova cor de erro */
            --transition: 0.4s ease-in-out;
        }

        /* --- ESTILOS BASE E BACKGROUND --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark);
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Animação do Background */
        .background-gradient {
            position: absolute;
            width: 800px; height: 800px;
            border-radius: 50%;
            filter: blur(250px); 
            opacity: 0.3;
            z-index: 0;
            animation: moveGradient 40s infinite ease-in-out alternate;
        }
        .gradient-1 { background: radial-gradient(circle, var(--accent-purple), transparent); top: -20%; left: -20%; }
        .gradient-2 { background: radial-gradient(circle, var(--accent-light), transparent); bottom: -20%; right: -20%; animation-delay: -20s; }
        @keyframes moveGradient {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 150px) scale(1.15); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- CONTAINER E CABEÇALHO --- */
        .container {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            text-align: center;
            z-index: 1;
            animation: fadeIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .title {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0px;
            background: linear-gradient(45deg, var(--accent-light), #6A0DAD);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(192, 128, 255, 0.8);
            letter-spacing: 1px;
            transition: text-shadow 0.3s ease; /* Adicionado para feedback de erro */
        }
        .subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* --- ESTILOS DO WIZARD (STEPS) --- */
        .steps-indicator { 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            padding: 0 10%; /* Espaço para a linha */
        }
        .steps-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 3px;
            background: var(--border-color);
            transform: translateY(-50%);
            z-index: 0;
        }
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
        }
        .step.active {
            background: var(--accent-purple);
            border-color: var(--accent-light);
            color: #fff;
            box-shadow: 0 0 20px var(--accent-light);
            animation: pulse 1.5s infinite alternate;
            transform: scale(1.1); 
        }
        @keyframes pulse {
            from { box-shadow: 0 0 10px var(--accent-light); }
            to { box-shadow: 0 0 30px var(--accent-light), 0 0 10px var(--accent-light); }
        }
        .step.completed {
            background: var(--success-color);
            border-color: var(--success-color);
            color: #fff;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.5);
            transform: scale(1.05);
        }
        .step.completed i { font-size: 1.1rem; }

        /* --- ANIMAÇÃO DE TRANSIÇÃO DOS PASSOS --- */
        .step-content { 
            display: none; 
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
            flex-direction: column; 
            gap: 25px;
        }
        .step-content.active { 
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }
        /* Classe temporária para transição de saída */
        .step-content.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            display: flex; /* Mantém flex para animar antes de sumir */
        }

        /* --- FORMS E INPUTS (Refinados) --- */
        .form-group { position: relative; width: 100%; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid transparent;
            border-radius: 18px;
            background: rgba(40, 15, 60, 0.7);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
            transition: all var(--transition);
            font-weight: 500;
            /* Reset de aparência para Select */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 25px rgba(192, 128, 255, 1);
            background: rgba(40, 15, 60, 1);
            transform: scale(1.01); 
        }
        /* Estilo de Erro */
        .form-group input.error, .form-group select.error {
            border-color: var(--error-color) !important;
            box-shadow: 0 0 10px var(--error-color) !important;
        }
        .form-group input.error:focus, .form-group select.error:focus {
            border-color: var(--error-color) !important;
            box-shadow: 0 0 25px var(--error-color) !important;
        }


        /* Ícones */
        .icon.input-icon { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%); 
            color: var(--text-muted); font-size: 1.1rem; transition: color var(--transition); 
            pointer-events: none;
        }
        .icon.toggle-password { 
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%); 
            cursor: pointer; font-size: 1.1rem; color: var(--text-muted); 
            transition: color var(--transition); z-index: 10;
        }
        .form-group input:focus ~ .icon.input-icon, .form-group select:focus ~ .icon.input-icon { color: var(--accent-light); }

        /* Estilo para Selects (para ícone ser visível) */
        .form-group select { padding-right: 45px; }

        /* --- BOTÕES DE NAVEGAÇÃO --- */
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }
        .btn-nav {
            flex-grow: 1;
            width: auto;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, flex-grow 0.3s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-light));
            color: #fff;
            box-shadow: 0 10px 30px rgba(192, 128, 255, 0.8);
            font-weight: 700;
        }
        .btn-primary:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 50px rgba(192, 128, 255, 1);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-secondary:hover { transform: translateY(-2px); border-color: var(--accent-light); }
        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* --- ESTILO DO RESUMO (PASSO 3) --- */
        .step-title-summary {
            margin-bottom: 20px; 
            color: var(--accent-light); 
            font-size: 1.3rem; 
            font-weight: 600;
            text-shadow: 0 0 10px rgba(192, 128, 255, 0.5);
        }
        .summary-box {
            text-align: left; 
            padding: 25px; 
            background: rgba(192, 128, 255, 0.1);
            border-radius: 20px; 
            margin-bottom: 25px; 
            font-size: 1rem;
            border: 1px solid var(--accent-light);
            box-shadow: 0 0 15px rgba(192, 128, 255, 0.5);
        }
        .summary-box p {
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-box span {
            color: var(--text-color);
            font-weight: 600;
            max-width: 60%; 
            text-align: right;
            line-height: 1.4;
        }
        .summary-box i {
            color: var(--accent-light);
            margin-right: 10px;
            font-size: 1.1rem;
        }

        /* Checkbox */
        .checkbox-group { 
            display:flex; align-items:center; justify-content:center; gap:10px; font-size:0.95rem; 
            color: var(--text-muted); cursor:pointer; user-select:none; margin-top:10px;
        }
        .checkbox-group input[type="checkbox"] {
            -webkit-appearance:none; appearance:none; width:22px; height:22px; border:2px solid var(--border-color);
            border-radius:6px; background-color:transparent; position:relative; cursor:pointer; transition:all var(--transition);
            flex-shrink: 0;
        }
        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--accent-purple); border-color: var(--accent-purple); transform: scale(1.1);
        }
        .checkbox-group input[type="checkbox"]:checked::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight:900; color:white;
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:14px; 
            animation: popIn 0.3s cubic-bezier(0.68,-0.55,0.27,1.55);
        }
        @keyframes popIn { from{transform:translate(-50%,-50%) scale(0); opacity:0;} to{transform:translate(-50%,-50%) scale(1); opacity:1;} }
        .checkbox-group input[type="checkbox"].error {
            border-color: var(--error-color) !important;
        }


        /* Responsividade */
        @media (max-width:550px){
            .container{padding:30px 20px; max-width: 90%;}
            .title{font-size: 2.2rem;}
            .subtitle {font-size: 1rem; margin-bottom: 30px;}
            .step {width: 35px; height: 35px;}
            .form-group input, .form-group select {padding: 15px 45px 15px 15px;}
            .icon.toggle-password {right: 15px;}
            .summary-box p {flex-direction: column; align-items: flex-start;}
            .summary-box span {float: none; max-width: 100%; text-align: left; margin-top: 5px; font-size: 0.95rem;}
        }
    </style>
</head>
<body>

<div class="background-gradient gradient-1"></div>
<div class="background-gradient gradient-2"></div>

<div class="container">
    <h1 class="title">ATIVAÇÃO NEURAL</h1>
    <p class="subtitle">Crie seu ambiente SquareOS em 3 comandos.</p>

    <div class="steps-indicator">
        <div class="step active" id="step-1-indicator">1</div>
        <div class="step" id="step-2-indicator">2</div>
        <div class="step" id="step-3-indicator">3</div>
    </div>

    <form id="creation-form" action="/criar_maquina" method="POST">
        
        <div class="step-content active" data-step="1" id="step-1">
            <div class="form-group">
                <input type="text" id="maquina-nome" name="maquina" placeholder="Nome da Sua Nova Máquina (Ex: Alpha-3)" required>
                <i class="fa-solid fa-computer icon input-icon"></i>
            </div>
            <div class="form-group">
                <input type="text" id="maquina-user" name="user" placeholder="Usuário Principal (Recomendado: minúsculas)" required>
                <i class="fa-solid fa-user icon input-icon"></i>
            </div>
            <div class="form-group password-field">
                <input type="password" id="maquina-senha" name="senha" placeholder="Senha Forte para Acesso Remoto" required>
                <i class="fa-solid fa-lock icon input-icon"></i>
                <i class="fa-solid fa-eye-slash icon toggle-password" id="toggle-password"></i>
            </div>
        </div>

        <div class="step-content" data-step="2" id="step-2">
            <div class="form-group">
                <select name="local" id="local" required>
                    <option value="" disabled selected>Selecione a Região de Hospedagem</option>
                    <option value="sg">Singapura (Ásia) - Latência Ultra Baixa</option>
                    <option value="sp">São Paulo (América do Sul) - Melhor para o Brasil</option>
                    <option value="ny">New York (América do Norte) - Conexão Global</option>
                </select>
                <i class="fa-solid fa-globe icon input-icon"></i>
            </div>
            <div class="form-group">
                <select name="sistema" id="sistema" required>
                    <option value="" disabled selected>Selecione o Sistema Base (OS)</option>
                    <option value="v1">Square Lite (Nosso sistema mais leve)</option>
                    <option value="v2">Square Advanced (Sistema feito para jogos e apps pesados)</option>
                    <option value="v3">Square Developer (Apenas para programadores)</option>
                </select>
                <i class="fa-solid fa-window-maximize icon input-icon"></i>
            </div>
            <div class="form-group">
                <input type="number" id="maquina-ram" name="ram" placeholder="Memória RAM (Em GB. Limite da sua conta)" required min="1" value="4">
                <i class="fa-solid fa-memory icon input-icon"></i>
            </div>
        </div>

        <div class="step-content" data-step="3" id="step-3">
            <h3 class="step-title-summary">CONFIGURAÇÃO PRONTA PARA ATIVAÇÃO</h3>
            
            <div class="summary-box">
                <p><i class="fa-solid fa-computer"></i> Nome da Máquina: <span id="summary-name"></span></p>
                <p><i class="fa-solid fa-globe"></i> Região de Hospedagem: <span id="summary-local"></span></p>
                <p><i class="fa-solid fa-window-maximize"></i> Sistema Operacional: <span id="summary-os"></span></p>
                <p style="margin-bottom: 0;"><i class="fa-solid fa-memory"></i> Recursos Alocados: <span id="summary-ram"></span></p>
            </div>

            <label class="checkbox-group" for="termos-de-uso">
                <input type="checkbox" id="termos-de-uso" name="termos_de_uso" required>
                <span>**Confirmo** e Aceito os Termos de Serviço da SquareOS.</span>
            </label>

            <button type="submit" class="btn-primary btn-nav" id="final-submit-btn" style="margin-top: 20px; display: none;">
                <i class="fa-solid fa-rocket"></i> **LANÇAR MÁQUINA!**
            </button>
        </div>

        <div class="navigation-buttons">
            <button type="button" class="btn-nav btn-secondary" id="prev-btn" onclick="handleStepChange(-1)" disabled>
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </button>
            <button type="button" class="btn-nav btn-primary" id="next-btn" onclick="handleStepChange(1)">
                Próximo Comando <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>
    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;
    const transitionDuration = 300; // 0.3s

    /**
     * Valida os campos do passo atual e aplica feedback visual de erro.
     * @returns {boolean} True se todos os campos obrigatórios estão preenchidos.
     */
    function validateStep() {
        const currentContent = document.getElementById(`step-${currentStep}`);
        const requiredInputs = currentContent.querySelectorAll('[required]');
        let isValid = true;
        
        requiredInputs.forEach(input => {
            let isFieldValid = true;

            if (input.type === 'checkbox') {
                isFieldValid = input.checked;
            } else if (input.tagName === 'SELECT') {
                isFieldValid = input.value !== "" && input.value !== null;
            } else {
                isFieldValid = input.value.trim() !== "";
            }

            if (!isFieldValid) {
                input.classList.add('error');
                isValid = false;
            } else {
                input.classList.remove('error');
            }
        });
        
        if (!isValid) {
            // Feedback visual no título
            const titleElement = document.querySelector('.title');
            titleElement.style.textShadow = '0 0 20px var(--error-color)';
            setTimeout(() => { 
                titleElement.style.textShadow = '0 0 15px rgba(192, 128, 255, 0.8)'; 
            }, 600); // 0.6s de duração para a borda de erro sumir
        }
        
        return isValid; 
    }

    /**
     * Função principal para lidar com a mudança de passo.
     * @param {number} n 1 para avançar, -1 para voltar.
     */
    function handleStepChange(n) {
        if (n === 1 && !validateStep()) {
            return; // Impede o avanço se a validação falhar
        }

        const currentContent = document.getElementById(`step-${currentStep}`);
        
        // 1. Inicia a animação de saída
        currentContent.classList.add('fade-out');
        currentContent.classList.remove('active');

        setTimeout(() => {
            // Remove a classe de animação após o delay
            currentContent.classList.remove('fade-out');
            
            // 2. Atualiza o estado
            updateStepState(n); 

            const nextContent = document.getElementById(`step-${currentStep}`);
            
            // 3. Exibe o novo conteúdo (inicia a animação de entrada)
            nextContent.classList.add('active');

            // 4. Se for o passo de resumo (3), atualiza o resumo
            if (currentStep === totalSteps) {
                updateSummary();
            }
        }, transitionDuration);
    }

    /**
     * Atualiza o número do passo atual e os indicadores visuais.
     * @param {number} n 1 para avançar, -1 para voltar.
     */
    function updateStepState(n) {
        // Atualiza o currentStep, mantendo-o nos limites
        let newStep = currentStep + n;
        currentStep = Math.max(1, Math.min(totalSteps, newStep));

        // Atualiza os indicadores de status (bolinhas)
        for (let i = 1; i <= totalSteps; i++) {
            const indicator = document.getElementById(`step-${i}-indicator`);
            
            if (i === currentStep) {
                // Passo ATIVO
                indicator.classList.add('active');
                indicator.classList.remove('completed');
                indicator.innerHTML = i;
            } else if (i < currentStep) {
                // Passo CONCLUÍDO
                indicator.classList.add('completed');
                indicator.classList.remove('active');
                indicator.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else {
                // Passo FUTURO
                indicator.classList.remove('active', 'completed');
                indicator.innerHTML = i;
            }
        }
        
        updateNavigationButtons();
    }

    /**
     * Controla a visibilidade e o texto dos botões de navegação.
     */
    function updateNavigationButtons() {
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const finalSubmitBtn = document.getElementById('final-submit-btn');

        // O botão Voltar é desabilitado no primeiro passo
        prevBtn.disabled = (currentStep === 1);
        
        if (currentStep === totalSteps) {
            // No último passo, exibe o botão de Submissão final
            nextBtn.style.display = 'none';
            finalSubmitBtn.style.display = 'flex'; // Usar flex para herdar o estilo do btn-nav
            prevBtn.style.flexGrow = '0.5';
            finalSubmitBtn.style.flexGrow = '1.5';

        } else {
            // Nos passos intermediários, exibe o botão Próximo
            nextBtn.style.display = 'flex';
            finalSubmitBtn.style.display = 'none';
            prevBtn.style.flexGrow = '1';
        }
    }

    function updateSummary() {
        const localSelect = document.getElementById('local');
        const osSelect = document.getElementById('sistema');

        // Função auxiliar para pegar o texto de um select
        const getSelectText = (select) => {
            return select.options[select.selectedIndex] ? select.options[select.selectedIndex].text : 'Não Definido';
        };

        // Preenche as spans do resumo
        document.getElementById('summary-name').innerText = document.getElementById('maquina-nome').value || 'Não Definido';
        document.getElementById('summary-local').innerText = getSelectText(localSelect);
        document.getElementById('summary-os').innerText = getSelectText(osSelect);
        document.getElementById('summary-ram').innerText = (document.getElementById('maquina-ram').value || '4') + ' GB';
    }

    // --- Componentes Extras ---

    // Alternar visibilidade da senha
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('maquina-senha');

    if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }

    // --- Inicialização ---
    document.addEventListener('DOMContentLoaded', () => {
        // Garante que o estado inicial (Passo 1) esteja correto
        for (let i = 2; i <= totalSteps; i++) {
            document.getElementById(`step-${i}`).classList.remove('active');
        }
        updateNavigationButtons();
    });
</script>

</body>
</html>
