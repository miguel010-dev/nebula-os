<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SquareOS • E-mail Enviado</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="assets/icones/icones 1/logo.png" type="image/png">
    
    <style>
        /* --- Variáveis de Cores e Estilos - Tema Roxo/Neon --- */
        :root {
            --bg-dark: #000000;
            --bg-input: rgba(30, 30, 40, 0.9);
            --text-light: #F0F0FF;
            --text-muted: #8F9BB3; 
            --primary-purple: #A366FF; 
            --secondary-magenta: #E040FB; 
            --glass-bg: rgba(10, 10, 20, 0.75);
            --success-green: #00FF7F; /* Verde Neon para Sucesso */
            --border-color-subtle: rgba(163, 102, 255, 0.2);
            --shadow-glow: 0 0 25px rgba(163, 102, 255, 0.3);
            --shadow-deep: 0 10px 40px rgba(0, 0, 0, 0.7);
            --transition-speed: 0.3s ease-in-out;
        }

        /* --- Reset e Base --- */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body {
            height:100vh; display:flex; justify-content:center; align-items:center;
            background:var(--bg-dark);
            color: var(--text-light);
            overflow:hidden; position:relative;
        }

        /* --- Aura de Fundo (Apenas uma cor para um fundo mais calmo de sucesso) --- */
        .aura-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(250px);
            opacity: 0.4;
            z-index: 0;
            background: radial-gradient(circle, var(--primary-purple), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* --- Container da Mensagem --- */
        .container {
            position:relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius:20px;
            padding:50px 40px;
            width:100%;
            max-width:420px;
            text-align:center;
            box-shadow:var(--shadow-deep), var(--shadow-glow);
            z-index:1;
            border:1px solid var(--border-color-subtle);
            transition: all var(--transition-speed);
        }

        /* --- Ícone de Sucesso --- */
        .success-icon {
            color: var(--success-green);
            font-size: 4rem;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(0, 255, 127, 0.6);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .title {
            font-size:1.8rem; font-weight:800; color:var(--text-light); margin-bottom:10px;
            letter-spacing:1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }
        
        /* Destaque para o e-mail */
        .subtitle strong {
            color: var(--success-green);
            font-weight: 600;
        }


        /* --- Botão Principal --- */
        button {
            width:100%; 
            padding:16px; 
            margin-top:10px;
            border:none; 
            border-radius:12px;
            font-size:1.1rem; 
            font-weight:700;
            cursor:pointer; 
            transition:all var(--transition-speed);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botão Principal: Gradiente Roxo/Magenta */
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-purple), var(--secondary-magenta));
            color: var(--bg-dark);
            box-shadow: 0 8px 20px rgba(163, 102, 255, 0.4);
            position: relative;
            z-index: 1;
        }
        
        /* Efeito Holográfico/Neon no Hover */
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(224, 64, 251, 0.8);
            background: var(--bg-dark);
            color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
        }

        /* --- Responsividade --- */
        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 30px 20px;
            }
            .success-icon {
                font-size: 3.5rem;
            }
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="aura-glow"></div>

<div class="container">
    
    <i class="fa-solid fa-envelope-circle-check success-icon"></i>

    <p class="title">E-mail de Redefinição Enviado</p>
    
    <p class="subtitle">
        Enviamos um link seguro de redefinição para o seu endereço de e-mail. 
        Por favor, verifique sua caixa de entrada (e a pasta de spam) e siga as instruções para redefinir sua senha.
        <br><br>
        O link tem validade limitada.
    </p>

    <a href="/login">
        <button class="btn-primary">
            Ir para a Tela de Login
        </button>
    </a>
</div>

</body>
</html>
