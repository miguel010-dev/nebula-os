<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SquareOS • Recuperar Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" href="assets/icones/icones 1/logo.png" type="image/png">
    
    <style>
        /* --- Variáveis de Cores e Estilos - Tema Roxo/Neon --- */
        :root {
            --bg-dark: #000000;
            --bg-input: rgba(30, 30, 40, 0.9);
            --text-light: #F0F0FF;
            --text-muted: #8F9BB3; /* Cinza azulado suave */
            --primary-purple: #A366FF; /* Roxo principal */
            --secondary-magenta: #E040FB; /* Magenta para gradientes */
            --glass-bg: rgba(10, 10, 20, 0.75); /* Fundo escuro semi-transparente */
            --border-color-subtle: rgba(163, 102, 255, 0.2);
            --shadow-glow: 0 0 25px rgba(163, 102, 255, 0.3);
            --shadow-deep: 0 10px 40px rgba(0, 0, 0, 0.7);
            --transition-speed: 0.3s ease-in-out;
        }

        /* --- Reset e Base --- */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body {
            height:100vh; display:flex; justify-content:center; align-items:center;
            background:var(--bg-dark);
            color: var(--text-light);
            overflow:hidden; position:relative;
        }

        /* --- Aura de Fundo --- */
        .aura-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(200px);
            opacity: 0.35;
            z-index: 0;
            animation: moveAura 15s infinite alternate;
        }
        .aura-1 {
            background: radial-gradient(circle, var(--primary-purple), transparent 60%);
            top: 5%; left: 5%;
        }
        .aura-2 {
            background: radial-gradient(circle, var(--secondary-magenta), transparent 60%);
            bottom: 5%; right: 5%;
            animation-delay: -7.5s;
        }
        @keyframes moveAura {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        /* --- Container do Formulário --- */
        .container {
            position:relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius:20px;
            padding:40px;
            width:100%;
            max-width:400px;
            text-align:center;
            box-shadow:var(--shadow-deep), var(--shadow-glow);
            z-index:1;
            border:1px solid var(--border-color-subtle);
            transition: all var(--transition-speed);
        }

        .title {
            font-size:2.2rem; font-weight:800; color:var(--text-light); margin-bottom:10px;
            letter-spacing:2px;
            text-shadow: 0 0 12px rgba(163, 102, 255, 0.6);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 300;
        }

        /* --- Input Groups --- */
        .input-group { 
            position:relative; 
            margin-bottom:25px; 
        }

        .input-group i {
            position:absolute; left:18px; top:50%;
            transform:translateY(-50%);
            color:var(--text-muted); font-size:1.1rem;
            transition:var(--transition-speed);
            z-index: 2;
        }
        
        /* ANIMAÇÃO DE ÍCONE NO FOCO */
        @keyframes iconPulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.05); }
            100% { transform: translateY(-50%) scale(1); }
        }

        input {
            width:100%; 
            padding:18px;
            padding-left: 50px;
            border:1px solid rgba(60, 60, 70, 0.5);
            border-radius:12px;
            background: var(--bg-input);
            color:var(--text-light); 
            font-size:1rem; 
            outline:none; 
            transition:all var(--transition-speed);
            font-weight: 500;
            position:relative; z-index:1;
        }

        input::placeholder { color:var(--text-muted); font-weight: 400; }

        input:focus {
            background: rgba(30, 30, 40, 1);
            border-color: var(--primary-purple);
            box-shadow: 0 0 12px rgba(163, 102, 255, 0.8);
            color: var(--primary-purple);
        }
        
        .input-group:focus-within i {
            color: var(--primary-purple);
            animation: iconPulse 1s infinite ease-in-out alternate;
        }
        
        /* --- Botões --- */
        button {
            width:100%; 
            padding:16px; 
            margin-top:20px;
            border:none; 
            border-radius:12px;
            font-size:1.1rem; 
            font-weight:700;
            cursor:pointer; 
            transition:all var(--transition-speed);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botão Principal: Gradiente Roxo/Magenta */
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-purple), var(--secondary-magenta));
            color: var(--bg-dark);
            box-shadow: 0 8px 20px rgba(163, 102, 255, 0.4);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        /* Efeito Holográfico/Neon no Hover */
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(224, 64, 251, 0.8);
            background: var(--bg-dark);
            color: var(--primary-purple);
            border: 2px solid var(--primary-purple);
        }
        
        /* Links de Rodapé */
        .links {
            margin-top:30px; 
            font-size:0.9rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .links a {
            color: var(--primary-purple); 
            text-decoration:none; 
            transition:color var(--transition-speed);
            font-weight: 600;
        }
        .links a:hover { 
            color: var(--secondary-magenta);
            text-decoration: underline;
        }

        /* --- Bolhas --- */
        .bubble {
            position:absolute; width:15px; height:15px; background: rgba(163, 102, 255, 0.5);
            border-radius:50%; pointer-events:none;
            animation: bubblePop 0.4s ease-out forwards; z-index:10;
        }
        @keyframes bubblePop {
            0% { transform: scale(1); opacity:1; }
            100% { transform: scale(2.5); opacity:0; }
        }

        /* --- Responsividade --- */
        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 30px 25px;
            }
            .title {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
<div class="aura-glow aura-1"></div>
<div class="aura-glow aura-2"></div>

<form action="/recuperar" method="POST" autocomplete="off" novalidate>
    <div class="container">
        <p class="title">Recuperar Acesso</p>
        <p class="subtitle">Insira seu e-mail cadastrado. Enviaremos um link seguro para redefinição de senha.</p>

        <div class="input-group">
            <input name="email" type="email" placeholder="Seu E-mail de Registro" required />
            <i class="fa-solid fa-envelope"></i>
        </div>

        <button type="submit" class="btn-primary">Enviar Link de Redefinição</button>

        <div class="links">
            <a href="/login">← Voltar para a Tela de Login</a>
        </div>
    </div>
</form>

<audio id="bubbleSound" preload="auto">
    <source src="assets/sons/bubble-pop-06-351337.mp3" type="audio/mpeg">
</audio>

<script>
    const inputs = document.querySelectorAll('input');
    const button = document.querySelector('.btn-primary');
    const bubbleSound = document.getElementById('bubbleSound');
    
    // Função para criar a bolha e tocar o som (CORRIGIDA)
    function createBubble(e, targetElement) {
        if (bubbleSound) {
            // Garante que o som pare antes de reiniciar para evitar o erro "current indefinido"
            bubbleSound.pause(); 
            bubbleSound.currentTime = 0;
            
            // Tenta dar play e trata a Promise, tornando a reprodução robusta
            const playPromise = bubbleSound.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Reprodução bem-sucedida
                }).catch(error => {
                    // Loga erro caso o navegador bloqueie o som por alguma política
                    console.error("Erro ao reproduzir som da bolha:", error);
                });
            }
        }

        const bubble = document.createElement('span');
        bubble.className = 'bubble';
        
        // Coordenadas relativas ao elemento clicado (input ou button)
        bubble.style.left = e.offsetX + 'px';
        bubble.style.top = e.offsetY + 'px';
        
        targetElement.appendChild(bubble);

        // Remove bolha depois da animação
        bubble.addEventListener('animationend', () => bubble.remove());
    }

    // Adiciona o efeito a inputs e botões
    inputs.forEach(input => {
        // Usa o parentElement (.input-group) para garantir que a bolha fique sobre ele.
        input.addEventListener('click', (e) => createBubble(e, input.parentElement));
    });
    
    if (button) {
        button.addEventListener('click', (e) => createBubble(e, button));
    }
</script>
</body>
</html>
